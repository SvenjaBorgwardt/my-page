<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found · Svenja Borgwardt</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#F6F1E6">
<!-- Light-only palette; opt out of Chrome's Android auto-dark. -->
<meta name="color-scheme" content="light">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  :root{
    --paper:#F6F1E6;--ink:#141018;--ink-soft:#3A3440;--ink-dim:#6A6472;
    --rule:#D4C9AF;--rust:#9F3A1F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:'Cormorant Garamond',serif;font-weight:400;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:2em 1.4em;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:26em}
  .code{
    font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.28em;
    text-transform:uppercase;color:var(--rust);margin-bottom:1.4em;
  }
  h1{font-weight:300;font-size:clamp(30px,6vw,46px);line-height:1.15;margin-bottom:0.5em;letter-spacing:0.005em}
  h1 em{font-style:italic;font-weight:300}
  p{font-size:1.05rem;color:var(--ink-soft);margin-bottom:1.6em;font-style:italic}
  a.home{
    display:inline-block;font-size:0.7rem;font-family:'JetBrains Mono',monospace;
    letter-spacing:0.2em;text-transform:uppercase;color:var(--ink);
    text-decoration:none;border-bottom:1px solid var(--rust);padding-bottom:2px;
    transition:color .3s;
  }
  a.home:hover{color:var(--rust)}
  a:focus-visible{outline:2px solid var(--rust);outline-offset:3px}
  ::selection{background:rgba(159,58,31,.15);color:var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page took a <em>wrong turn</em></h1>
    <p>The link is broken or the page has moved. Everything I build still lives one step back.</p>
    <a class="home" href="/">Back to the start &rarr;</a>
  </div>
</body>
</html>
