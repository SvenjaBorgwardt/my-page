# Quality gate. There is no build step to protect, but every push still has
# to prove the two claims the README makes: the W3C validator finds zero
# errors, and axe finds zero violations. Both tools come from the runner
# image (Java, Chrome + matching chromedriver are preinstalled).
name: quality

on: push

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The same engine as validator.w3.org; any error fails the push.
      - name: HTML validation (W3C Nu)
        run: |
          npm install --no-save --no-audit --no-fund vnu-jar
          java -jar node_modules/vnu-jar/build/dist/vnu.jar --errors-only \
            index.html impressum.html datenschutz.html 404.html

      # axe against the served pages. Story panels are checked open in the
      # local Playwright pass; here the shipped DOM of every page must be clean.
      # force-prefers-reduced-motion: the page then renders its own still
      # variant — without it axe can sample the reveal fades mid-transition
      # and report phantom contrast violations.
      - name: axe (headless Chrome)
        run: |
          npm install --no-save --no-audit --no-fund @axe-core/cli
          python3 -m http.server 8000 &
          sleep 1
          npx axe --chromedriver-path "$CHROMEWEBDRIVER/chromedriver" --exit \
            --chrome-options "headless=new,no-sandbox,disable-dev-shm-usage,force-prefers-reduced-motion" \
            http://localhost:8000/ \
            http://localhost:8000/impressum.html \
            http://localhost:8000/datenschutz.html \
            http://localhost:8000/404.html
